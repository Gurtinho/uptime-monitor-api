services:
  database:
    image: postgres:15-alpine
    container_name: uptime-monitor-api-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7.4-alpine
    container_name: uptime-monitor-api-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
