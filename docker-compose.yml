services:
  database:
    image: postgres:15-alpine
    container_name: uptime-monitor-api-postgres
    restart: ${RESTART_DB}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7.4-alpine
    container_name: uptime-monitor-api-redis
    restart: no
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  redis_data:
